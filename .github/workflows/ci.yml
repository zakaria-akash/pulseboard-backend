name: CI

# Run on every push to main and on every pull request targeting main.
# This ensures broken code cannot be merged without passing all gates.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Type-check · Lint · Test
    runs-on: ubuntu-latest

    # mongodb-memory-server downloads a real mongod binary during npm install.
    # We cache node_modules to avoid re-downloading it on every run.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # `npm ci` installs from package-lock.json — reproducible and faster than
      # `npm install`. It also fails if the lock file is out of sync.
      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # Gate 1: TypeScript must compile with zero errors.
      - name: Type-check
        run: npm run typecheck

      # Gate 2: ESLint must report no errors (warnings are allowed).
      - name: Lint
        run: npm run lint

      # Gate 3: Prettier must consider all files already formatted.
      - name: Format check
        run: npm run format:check

      # Gate 4: All tests must pass AND coverage thresholds must be met.
      # Thresholds are defined in jest.config.ts:
      #   lines: 70%, functions: 70%, branches: 60%, statements: 70%
      - name: Test with coverage
        run: npm run test:coverage
        env:
          # mongodb-memory-server needs a writable cache dir in CI.
          MONGOMS_DOWNLOAD_DIR: /tmp/mongodb-memory-server
          # Provide the required env vars the app validates at startup.
          MONGO_URI: mongodb://localhost:27017/pulseboard-ci
          JWT_SECRET: ci-jwt-secret-placeholder-must-be-32chars!!
          BCRYPT_ROUNDS: "4"
          NODE_ENV: test
          CORS_ORIGIN: http://localhost:3000
